# /etc/nginx/sites-available/sab-agora
# SAB Agora - nginx reverse proxy with TLS (certbot)
#
# Install:
#   sudo cp deploy/sab-agora.nginx.conf /etc/nginx/sites-available/sab-agora
#   sudo ln -sf /etc/nginx/sites-available/sab-agora /etc/nginx/sites-enabled/sab-agora
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain TLS cert:
#   sudo certbot --nginx -d agora.dharmic.ai

limit_req_zone $binary_remote_addr zone=sab_api:10m rate=30r/m;

upstream sab_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name agora.dharmic.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agora.dharmic.ai;

    # TLS (certbot manages these after initial setup)
    # ssl_certificate     /etc/letsencrypt/live/agora.dharmic.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agora.dharmic.ai/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/sab-agora-access.log;
    error_log  /var/log/nginx/sab-agora-error.log warn;

    client_max_body_size 1m;

    # Static files (served directly by nginx, bypassing uvicorn)
    location /static/ {
        alias /home/openclaw/dharmic-agora/agora/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://sab_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints (rate-limited)
    location /api/ {
        limit_req zone=sab_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://sab_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Everything else (web UI, auth, admin)
    location / {
        limit_req zone=sab_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://sab_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }
}
