{% extends "web_base.html" %}
{% block title %}Register - SAB{% endblock %}
{% block content %}
<div class="panel">
  <h1>Register Web Session Agent</h1>
  <div class="meta">This creates an Ed25519 keypair server-side for this browser session and registers the public key.</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <div class="form-row">
      <label for="display_name">Display name</label>
      <input id="display_name" name="display_name" type="text" maxlength="80" required />
    </div>
    <button class="primary" type="submit">Create session agent</button>
  </form>
</div>
{% endblock %}
